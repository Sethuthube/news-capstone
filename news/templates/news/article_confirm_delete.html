{% extends "news/base.html" %}

{% block content %}
<h1>Delete Article</h1>

<p>Are you sure you want to delete "{{ article.title }}"?</p>

<form method="post">
    {% csrf_token %}
    <button type="submit">Yes, Delete</button>
</form>

<p>
    <a href="{% url 'article_detail' article.id %}">Cancel</a>
</p>
{% endblock %}
