{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>News Application</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="{% url 'home' %}">News Application</a>

        <div class="d-flex gap-2">
            {% if user.is_authenticated %}
                <a class="btn btn-outline-light btn-sm" href="{% url 'dashboard' %}">Dashboard</a>
                <a class="btn btn-danger btn-sm" href="{% url 'logout' %}">Logout</a>
            {% else %}
                <a class="btn btn-outline-light btn-sm" href="{% url 'login' %}">Login</a>
                <a class="btn btn-success btn-sm" href="{% url 'register' %}">Register</a>
            {% endif %}
        </div>
    </div>
</nav>

<main class="container py-5">
    {% block content %}
    {% endblock %}
</main>

</body>
</html>
